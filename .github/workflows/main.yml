name: GitHub Profile

on:
  # Schedule daily updates
  schedule: [{ cron: "0 1 * * *" }]
  workflow_dispatch:
  push: { branches: "main" }

jobs:
  github-profile:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.PROFILE_TOKEN }}
          output-path: "game.gif"
          strategy: "random"
