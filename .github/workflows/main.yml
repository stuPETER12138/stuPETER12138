name: Metrics

on:
  # Schedule daily updates
  schedule: [{ cron: "0 8 * * *" }]
  workflow_dispatch:
  push: { branches: "main" }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.PROFILE_TOKEN }}
          output-path: "game.gif"
          # write-dataurl-to: 'README.md'   # for dataurl generation.
          strategy: "random"
